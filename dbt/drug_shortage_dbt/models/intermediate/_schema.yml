version: 2

models:
  - name: dim_drug
    description: >
      One row per drug_code, denormalized from the 8 DPD staging tables.
    columns:
      - name: drug_code
        data_tests:
          - unique
          - not_null
      - name: din
        data_tests:
          - not_null:
              config:
                where: "has_din = true"
      - name: has_din
        data_tests:
          - not_null
      - name: brand_name
        data_tests:
          - not_null
      - name: product_status_extract
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['marketed', 'cancelled', 'approved', 'dormant']
      - name: company_name
        data_tests:
          - not_null

  - name: fct_shortage_episode
    description: >
      One row per shortage report event, joined to drug metadata via dim_drug.
    columns:
      - name: report_id
        data_tests:
          - unique
          - not_null
      - name: din
        data_tests:
          - not_null:
              config:
                where: "has_din = true"
      - name: shortage_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - 'Resolved'
                  - 'Actual shortage'
                  - 'Avoided shortage'
                  - 'Anticipated shortage'
      - name: matched_to_dpd
        data_tests:
          - not_null
      - name: actual_duration_days
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
              config:
                where: "actual_duration_days is not null"

  - name: int_drug_month_spine
    columns:
      - name: observation_date
        data_tests:
          - not_null
      - name: din
        data_tests:
          - not_null
      - name: shortage_started_within_90d
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: was_in_shortage_on_obs_date
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]

  - name: int_shortage_features
    description: >
      Feature set for the shortage prediction panel. One row per
      (din, observation_date) matching int_drug_month_spine.
      Six feature groups:
        1. Drug intrinsic attributes
        2. Drug's own shortage history
        3. Manufacturer portfolio (incl. 3m trajectory)
        4. Market structure (incl. concentration)
        5. Peer shortage signals
        6. Discontinuation signals
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - observation_date
              - din
    columns:
      - name: observation_date
        data_tests:
          - not_null
      - name: din
        data_tests:
          - not_null

      # Group 2
      - name: shortages_prior_12m
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}

      # Group 3
      - name: mfr_portfolio_size
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: mfr_shortage_rate_3m
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: mfr_shortage_rate_delta_3m_vs_12m
        data_tests:
          - not_null

      # Group 4
      - name: competing_drugs_same_ai_group
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: mfr_share_of_ai_group
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0, max_value: 1}
      - name: n_manufacturers_in_ai_group
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}

      # Group 5
      - name: peer_shortages_prior_12m_same_ai_group
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: peer_any_in_shortage_now_same_ai_group
        data_tests:
          - not_null
          - accepted_values:
              arguments: {values: [0, 1]}

      # Group 6
      - name: peer_discontinuations_prior_12m
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: mfr_discontinuation_rate_12m
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}

  - name: dim_drug_by_din
    columns:
      - name: din
        data_tests:
          - unique
          - not_null
      - name: drug_code
        data_tests:
          - not_null