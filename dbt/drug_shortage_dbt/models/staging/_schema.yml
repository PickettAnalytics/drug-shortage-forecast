version: 2

models:
  - name: stg_hc_shortages
    description: >
      Cleaned Health Canada drug shortage reports. One row per report.
      DIN is zero-padded to 8 characters. Dates are safely cast with TRY_CAST.
      Filtered to reports on/after 2017-03-14 (the mandatory reporting era),
      plus anticipated reports with no actual start date yet.
    columns:
      - name: report_id
        description: "Primary key. Unique identifier for each shortage report."
        data_tests:
          - unique
          - not_null
      - name: din
        description: >
          Drug Identification Number, zero-padded to 8 characters.
          NULL for radiopharmaceuticals (Schedule C).
        data_tests:
          - not_null:
              config:
                where: "has_din = true"
      - name: has_din
        data_tests:
          - not_null
      - name: brand_name
        data_tests:
          - not_null
      - name: company_name
        data_tests:
          - not_null
      - name: shortage_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - 'Resolved'
                  - 'Actual shortage'
                  - 'Avoided shortage'
                  - 'Anticipated shortage'
      - name: is_tier_3
        data_tests:
          - not_null

  - name: stg_hc_discontinuations
    description: >
      Cleaned Health Canada drug discontinuation reports. One row per report.
    columns:
      - name: report_id
        data_tests:
          - unique
          - not_null
      - name: din
        data_tests:
          - not_null:
              config:
                where: "has_din = true"
      - name: has_din
        data_tests:
          - not_null
      - name: brand_name
        data_tests:
          - not_null
      - name: company_name
        data_tests:
          - not_null
      - name: discontinuation_status
        data_tests:
          - not_null
      - name: is_tier_3
        data_tests:
          - not_null

  - name: stg_dpd_drug
    columns:
      - name: drug_code
        data_tests:
          - unique
          - not_null
      - name: din
        data_tests:
          - not_null:
              config:
                where: "has_din = true"
      - name: has_din
        data_tests:
          - not_null
      - name: brand_name
        data_tests:
          - not_null
      - name: product_status_extract
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['marketed', 'cancelled', 'approved', 'dormant']
 
  - name: stg_dpd_comp
    columns:
      - name: drug_code
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('stg_dpd_drug')
                field: drug_code
      - name: company_name
        data_tests:
          - not_null

  - name: stg_dpd_ingred
    columns:
      - name: drug_code
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_dpd_drug')
                field: drug_code
      - name: ingredient
        data_tests:
          - not_null

  - name: stg_dpd_form
    columns:
      - name: drug_code
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_dpd_drug')
                field: drug_code

  - name: stg_dpd_route
    columns:
      - name: drug_code
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_dpd_drug')
                field: drug_code

  - name: stg_dpd_ther
    columns:
      - name: drug_code
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_dpd_drug')
                field: drug_code

  - name: stg_dpd_status
    columns:
      - name: drug_code
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_dpd_drug')
                field: drug_code
      - name: status
        data_tests:
          - not_null
      - name: history_date
        data_tests:
          - not_null:
              config:
                where: "is_current_status = true"

  - name: stg_dpd_schedule
    columns:
      - name: drug_code
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_dpd_drug')
                field: drug_code

  - name: stg_fda_shortages
    description: >
      Cleaned openFDA drug shortage events. One row per (record × active
      ingredient) — combination products are exploded into multiple rows.
      Dates parsed from MM/DD/YYYY. substance_name is upper-trimmed to
      match against Canadian stg_dpd_ingred.ingredient.
    columns:
      - name: initial_posting_date
        description: "Canonical event date. Filtered to non-null at staging."
        data_tests:
          - not_null
      - name: substance_name
        description: "Active ingredient, upper/trimmed for matching to Canadian DPD."
        data_tests:
          - not_null
      - name: status
        description: "FDA lifecycle status at last update."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Current', 'Resolved', 'To Be Discontinued']
      - name: is_active_shortage
        data_tests:
          - not_null
      - name: is_resolved
        data_tests:
          - not_null
      - name: is_to_be_discontinued
        data_tests:
          - not_null