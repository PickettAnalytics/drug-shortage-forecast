version: 2

models:
  - name: mrt_shortage_panel
    description: >
      Analytics-ready panel for shortage prediction modelling. One row per
      (din, observation_date) at month-start granularity. Joins the labeled
      spine to the feature set. This is the single table the ML pipeline
      consumes.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - observation_date
              - din
      - dbt_utils.equal_rowcount:
          arguments:
            compare_model: ref('int_drug_month_spine')
    columns:
      - name: observation_date
        data_tests:
          - not_null
      - name: din
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_drug_by_din')
                field: din
      - name: drug_code
        data_tests:
          - not_null

      - name: shortage_started_within_90d
        data_tests:
          - not_null
          - accepted_values:
              arguments: {values: [0, 1]}
      - name: was_in_shortage_on_obs_date
        data_tests:
          - not_null
          - accepted_values:
              arguments: {values: [0, 1]}

      # Drug attributes
      - name: drug_age_years
      - name: atc_code_full
      - name: atc_anatomic_group
      - name: atc_therapeutic_group
      - name: primary_form
      - name: primary_route
      - name: schedule
      - name: ingredient_count
      - name: is_pediatric
      - name: has_atc_classification

      # Own-drug shortage history
      - name: shortages_prior_12m
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: shortages_prior_36m
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: shortages_all_prior
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: days_since_last_shortage
      - name: days_since_first_shortage
      - name: longest_prior_shortage_days
      - name: was_ever_in_shortage
        data_tests:
          - not_null
      - name: avg_inter_shortage_interval_days
      - name: days_overdue

      # Manufacturer
      - name: mfr_portfolio_size
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: mfr_shortages_prior_12m
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: mfr_shortage_rate_12m
        data_tests:
          - not_null
      - name: mfr_shortage_rate_3m
        data_tests:
          - not_null
      - name: mfr_shortage_rate_delta_3m_vs_12m
        data_tests:
          - not_null

      # Market structure
      - name: competing_drugs_same_ai_group
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: mfr_share_of_ai_group
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0, max_value: 1}
      - name: n_manufacturers_in_ai_group
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}

      # Peer shortage signals
      - name: peer_shortages_prior_12m_same_ai_group
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: peer_any_in_shortage_now_same_ai_group
        data_tests:
          - not_null
          - accepted_values:
              arguments: {values: [0, 1]}

      # Discontinuation signals
      - name: peer_discontinuations_prior_12m
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: peer_discontinuations_prior_36m
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: days_since_peer_discontinuation
      - name: mfr_discontinuations_prior_12m
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: mfr_discontinuation_rate_12m
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}

      # FDA shortage signals (cold-start model)
      - name: fda_ingredient_match_flag
        data_tests:
          - not_null
          - accepted_values:
              arguments: {values: [0, 1]}
      - name: fda_active_ingredients_in_us_shortage
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: fda_ingredients_in_us_shortage_12m
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}

      # Formulary coverage (CIHI)
      - name: n_jurisdictions_on_formulary
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0, max_value: 12}
      - name: n_programs_as_benefit
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments: {min_value: 0}
      - name: formulary_is_generic
        data_tests:
          - not_null
      - name: formulary_is_biologics
        data_tests:
          - not_null

      # Metadata
      - name: dbt_loaded_at
        data_tests:
          - not_null